name: Push
run-name: ${{ github.ref_name }} push run 🚀
on:
  push:
    paths-ignore:
      - '**.md'
    tags:
      - '*'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-project:
    name: Build 🧱
    uses: ./.github/workflows/build-project.yaml
    secrets: inherit
    permissions:
      contents: read
  create-release:
    name: Create Release 🛫
    if: >-
      ${{
        always() &&
        github.ref_type == 'tag' &&
        needs.build-project.result == 'success'
      }}
    runs-on: ubuntu-24.04
    needs: [build-project]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        if: github.ref_type == 'tag'
        with:
          fetch-depth: 1

      - name: Check Release Tag ☑️
        id: check
        run: |
          : Check Release Tag ☑️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi
          shopt -s extglob

          case "${GITHUB_REF_NAME}" in
            +([0-9]).+([0-9]).+([0-9]) )
              echo 'validTag=true' >> $GITHUB_OUTPUT
              echo 'prerelease=false' >> $GITHUB_OUTPUT
              echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
              ;;
            +([0-9]).+([0-9]).+([0-9])-@(beta|rc)*([0-9]) )
              echo 'validTag=true' >> $GITHUB_OUTPUT
              echo 'prerelease=true' >> $GITHUB_OUTPUT
              echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
              ;;
            whip-vbv-* | +([0-9]).+([0-9]).+([0-9])-whip-vbv* )
              echo 'validTag=true' >> $GITHUB_OUTPUT
              echo 'prerelease=true' >> $GITHUB_OUTPUT
              echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
              ;;
            *) echo 'validTag=false' >> $GITHUB_OUTPUT ;;
          esac

      - name: Download Build Artifacts 📥
        uses: actions/download-artifact@v4
        if: ${{ fromJSON(steps.check.outputs.validTag) }}

      - name: Rename Files 🏷️
        if: fromJSON(steps.check.outputs.validTag)
        run: |
          : Rename Files 🏷️
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi

          root_dir="${PWD}"

          move_first_match() {
            local pattern="$1"
            local destination="$2"
            local source

            source="$(find "${root_dir}" -type f -name "${pattern}" -print -quit)"
            if [[ -z "${source}" ]]; then
              echo "No file found for pattern: ${pattern}" >&2
              return 1
            fi

            mv -v "${source}" "${destination}"
          }

          echo '::group::Renaming Artifacts'
          move_first_match 'obs-studio-*-macos-apple.dmg' \
            "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-macOS-Apple.dmg"
          if find "${root_dir}" -type f -name 'obs-studio-*-macos-apple-dSYMs.tar.xz' | grep -q .; then
            move_first_match 'obs-studio-*-macos-apple-dSYMs.tar.xz' \
              "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-macOS-Apple-dSYMs.tar.xz"
          fi
          move_first_match 'obs-studio-*-macos-intel.dmg' \
            "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-macOS-Intel.dmg"
          if find "${root_dir}" -type f -name 'obs-studio-*-macos-intel-dSYMs.tar.xz' | grep -q .; then
            move_first_match 'obs-studio-*-macos-intel-dSYMs.tar.xz' \
              "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-macOS-Intel-dSYMs.tar.xz"
          fi
          move_first_match 'obs-studio-*-x86_64-ubuntu-gnu.deb' \
            "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Ubuntu-24.04-x86_64.deb"
          if find "${root_dir}" -type f -name 'obs-studio-*-x86_64-ubuntu-gnu-dbgsym.ddeb' | grep -q .; then
            move_first_match 'obs-studio-*-x86_64-ubuntu-gnu-dbgsym.ddeb' \
              "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Ubuntu-24.04-x86_64-dbsym.ddeb"
          fi
          move_first_match 'obs-studio-*-sources.tar.gz' \
            "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Sources.tar.gz"
          move_first_match 'obs-studio-*-windows-x64.zip' \
            "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-x64.zip"
          if find "${root_dir}" -type f -name 'OBS-Studio-*.exe' | grep -q .; then
            move_first_match 'OBS-Studio-*.exe' \
              "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-x64-Installer.exe"
          fi
          if find "${root_dir}" -type f -name 'OBS-Studio-*-pdbs.zip' | grep -q .; then
            move_first_match 'OBS-Studio-*-pdbs.zip' \
              "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-x64-PDBs.zip"
          fi
          move_first_match 'obs-studio-*-windows-arm64.zip' \
            "${root_dir}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-arm64.zip"
          echo '::endgroup::'

      - name: Generate Checksums 🪪
        if: fromJSON(steps.check.outputs.validTag)
        run: |
          : Generate Checksums 🪪
          if [[ "${RUNNER_DEBUG}" ]]; then set -x; fi
          shopt -s extglob

          echo "### Checksums" > ${{ github.workspace }}/CHECKSUMS.txt
          for file in ${{ github.workspace }}/@(*.deb|*.ddeb|*.dmg|*.tar.xz|*.tar.gz|*.exe|*.zip); do
            echo "    ${file##*/}: $(sha256sum "${file}" | cut -d " " -f 1)" >> ${{ github.workspace }}/CHECKSUMS.txt
          done

      - name: Build Release Notes 📝
        if: fromJSON(steps.check.outputs.validTag)
        run: |
          cat "${GITHUB_WORKSPACE}/docs/whip-release-notes.md" > "${GITHUB_WORKSPACE}/RELEASE_NOTES.txt"
          printf "\n\n" >> "${GITHUB_WORKSPACE}/RELEASE_NOTES.txt"
          cat "${GITHUB_WORKSPACE}/CHECKSUMS.txt" >> "${GITHUB_WORKSPACE}/RELEASE_NOTES.txt"

      - name: Create Release 🛫
        if: fromJSON(steps.check.outputs.validTag)
        id: create_release
        uses: softprops/action-gh-release@c062e08bd532815e2082a85e87e3ef29c3e6d191
        with:
          draft: true
          prerelease: ${{ fromJSON(steps.check.outputs.prerelease) }}
          tag_name: ${{ steps.check.outputs.version }}
          name: OBS Studio ${{ steps.check.outputs.version }}
          body_path: ${{ github.workspace }}/RELEASE_NOTES.txt
          files: |
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-macOS-*.dmg
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-macOS-*-dSYMs.tar.xz
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Ubuntu-*.deb
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Ubuntu-*.ddeb
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Sources.tar.gz
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-x64.zip
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-x64-Installer.exe
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-x64-PDBs.zip
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-arm64.zip
            ${{ github.workspace }}/OBS-Studio-${{ steps.check.outputs.version }}-Windows-arm64-PDBs.zip
